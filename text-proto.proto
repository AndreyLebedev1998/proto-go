syntax = "proto3";

package example;

option go_package = "github.com/your-org/contracts/go/example;example";

message TextMessage {
    string text = 1;
}
message UserId {
    int64 userId = 1;
}

message UserMessage {
    string name = 1;
    string lastName = 2;
    int64 Age = 3;
    int64 userId = 4;
}

service TextService {
    rpc SendText(TextMessage) returns (TextMessage);
}

service FindUserService {
    rpc FindUser(UserId) returns (UserMessage);
}
